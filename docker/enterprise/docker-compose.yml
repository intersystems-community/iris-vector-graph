services:
  iris-enterprise:
    image: containers.intersystems.com/intersystems/irishealth:2026.2.0AI.161.0
    container_name: ivg-iris-enterprise
    ports:
      - "31972:1972"
      - "62773:52773"
    environment:
      - ISC_CPF_MERGE_FILE=/home/irisowner/merge.cpf
    volumes:
      - ./iris.key:/usr/irissys/mgr/iris.key:ro
      - ./merge.cpf:/home/irisowner/merge.cpf:ro
      - ./libarno_callout.so:/tmp/libarno_callout.so:ro
      - ivg_enterprise_data:/home/irisowner/irisdata
    healthcheck:
      test: ["CMD", "/usr/irissys/bin/iris", "session", "iris", "-U%SYS", "Write 1"]
      interval: 15s
      timeout: 10s
      retries: 24
      start_period: 60s
    stdin_open: true
    tty: true

volumes:
  ivg_enterprise_data: {}
